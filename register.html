<!DOCTYPE html>
<html>
<head>
<title>Hotel Palash - Registration</title>

<style>


body{
margin:0;
padding:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee") no-repeat center/cover;
text-align:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,100,0,0.6);
z-index:-1;
}

h1{
background:darkgreen;
color:white;
padding:20px;
margin:0;
}

.container{
width:380px;
margin:70px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

h2{
color:darkgreen;
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid gray;
}

button{
padding:12px 30px;
background:linear-gradient(to right,darkgreen,green);
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:scale(1.1);
}

a{
text-decoration:none;
color:green;
}

</style>

</head>

<body>

<h1>Hotel Palash</h1>

<div class="container">

<h2>Registration</h2>

<form onsubmit="registerUser(event)">

<input type="text" id="fullname" placeholder="Full Name" required><br>

<input type="email" id="email" placeholder="Email" required><br>

<input type="text" id="username" placeholder="Username" required><br>

<input type="password" id="password" placeholder="Password" required><br>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required><br>

<button type="submit">Register</button>

<p>Already have account?
<a href="login.html">Login Here</a>
</p>

</form>

</div>
<script>
function registerUser(event)
{
    event.preventDefault();

    let fullname = document.getElementById("fullname").value;
    let email = document.getElementById("email").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword)
    {
        alert("Passwords do not match!");
        return;
    }

    let user =
    {
        fullname: fullname,
        email: email,
        username: username,
        password: password
    };

    localStorage.setItem("hotelUser", JSON.stringify(user));

    alert("Registration Successful!");

    window.location.href = "login.html";
}
</script>
</body>
</html>
