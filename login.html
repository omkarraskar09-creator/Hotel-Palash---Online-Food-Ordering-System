<!DOCTYPE html>
<html>
<head>
<title>Hotel Palash - Login</title>


<script>
function loginUser(event)
{
    event.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let savedUser = JSON.parse(localStorage.getItem("hotelUser"));

    if(savedUser &&
       username === savedUser.username &&
       password === savedUser.password)
    {
        alert("Login Successful!");
        window.location.href = "wd.html";
    }
    else
    {
        alert("Invalid Username or Password!");
    }
}
</script>

<style>
body{
margin:0;
padding:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee") no-repeat center/cover;
text-align:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,100,0,0.6);
z-index:-1;
}

h1{
background:darkgreen;
color:white;
padding:20px;
margin:0;
}

.container{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

h2{
color:darkgreen;
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
padding:12px 30px;
background:linear-gradient(to right,darkgreen,green);
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:scale(1.1);
}

a{
text-decoration:none;
color:green;
}
</style>

</head>

<body>

<h1>Hotel Palash</h1>

<div class="container">

<h2>Login</h2>

<form onsubmit="loginUser(event)">

<input type="text" id="username" placeholder="Enter Username" required><br>

<input type="password" id="password" placeholder="Enter Password" required><br>

<button type="submit">Login</button>

<p>Don't have account?
<a href="register.html">Register Here</a>
</p>

</form>
</div>

</body>
</html>
